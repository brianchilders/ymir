[tool.uv.workspace]
members = [
    "nornir",
    "muninn",
    "verdandi",
    "mimir",
]

[tool.uv]
dev-dependencies = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-mock>=3.14",
    "httpx>=0.27",
    "pytest-cov>=5.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = [
    "nornir/tests",
    "muninn/tests",
    "verdandi/tests",
    "mimir/tests",
    "pipeline_worker/tests",
    "room_node/tests",
    "enrollment/tests",
    "memory_extensions/tests",
]
markers = [
    "hardware: requires physical hardware (Pi, ReSpeaker USB) — skip in CI",
    "integration: requires live external services — skip in CI",
]
log_cli = true
log_cli_level = "INFO"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501"]

[tool.black]
line-length = 100
target-version = ["py311"]
